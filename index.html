<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nossas Memórias</title>

  <link rel="icon" href="https://em-content.zobj.net/source/apple/391/red-heart_2764-fe0f.png">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.css"/>
</head>

<body>

  <div id="start-screen">
    <button id="start-btn">Aperte aqui ❤️</button>
  </div>

  <main class="page">
    <div class="frame">

      <!-- CARROSSEL -->
      <div class="swiper">
        <div class="swiper-wrapper">
          <div class="swiper-slide"><img src="img/1.jpg" alt="Foto 1"></div>
          <div class="swiper-slide"><img src="img/2.jpg" alt="Foto 2"></div>
          <div class="swiper-slide"><img src="img/3.jpg" alt="Foto 3"></div>
          <div class="swiper-slide"><img src="img/4.jpg" alt="Foto 4"></div>
          <div class="swiper-slide"><img src="img/5.jpg" alt="Foto 5"></div>
          <div class="swiper-slide"><img src="img/6.jpg" alt="Foto 6"></div>
          <div class="swiper-slide"><img src="img/7.jpg" alt="Foto 7"></div>
        </div>
      </div>

      <!-- CONTEÚDO -->
      <div class="content-bottom">

        <!-- CONTADOR -->
        <div class="counter-emotional" id="counter"></div>

        <!-- TEXTO DIGITANDO -->
        <div class="typewrap">
          <div class="typewriter" id="typewriter"></div>
          <span class="caret"></span>
        </div>

        <!-- PLAYER -->
        <div class="music-player">
          <iframe
            id="sp-player"
            title="Música"
            src=""
            allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
            loading="lazy"
          ></iframe>
        </div>

      </div>

    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
