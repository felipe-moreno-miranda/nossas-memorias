<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nossas Memórias ❤️</title>

  <link rel="icon" href="https://em-content.zobj.net/source/apple/391/red-heart_2764-fe0f.png">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.css"/>
</head>

<body>

  <!-- START -->
  <div id="start-screen">
    <button id="start-btn">Aperte aqui ❤️</button>
  </div>

  <!-- CARD -->
  <div class="frame">

    <!-- CARROSSEL -->
    <div class="swiper">
      <div class="swiper-wrapper">
        <div class="swiper-slide">
          <img src="img/1.jpg" alt="Foto 1"
               onerror="this.src='https://via.placeholder.com/900x1600/111/fff?text=Foto+1'">
        </div>
        <div class="swiper-slide">
          <img src="img/2.jpg" alt="Foto 2"
               onerror="this.src='https://via.placeholder.com/900x1600/111/fff?text=Foto+2'">
        </div>
        <div class="swiper-slide">
          <img src="img/3.jpg" alt="Foto 3"
               onerror="this.src='https://via.placeholder.com/900x1600/111/fff?text=Foto+3'">
        </div>
        <div class="swiper-slide">
          <img src="img/4.jpg" alt="Foto 4"
               onerror="this.src='https://via.placeholder.com/900x1600/111/fff?text=Foto+4'">
        </div>
        <div class="swiper-slide">
          <img src="img/5.jpg" alt="Foto 5"
               onerror="this.src='https://via.placeholder.com/900x1600/111/fff?text=Foto+5'">
        </div>
        <div class="swiper-slide">
          <img src="img/6.jpg" alt="Foto 6"
               onerror="this.src='https://via.placeholder.com/900x1600/111/fff?text=Foto+6'">
        </div>
        <div class="swiper-slide">
          <img src="img/7.jpg" alt="Foto 7"
               onerror="this.src='https://via.placeholder.com/900x1600/111/fff?text=Foto+7'">
        </div>
      </div>
    </div>

    <!-- PARTE DE BAIXO -->
    <div class="content-bottom">

      <!-- CONTADOR (em cima do texto) -->
      <div class="counter-emotional" id="counter"></div>

      <!-- TEXTO DIGITANDO -->
      <div class="typewrap">
        <div class="typewriter" id="typewriter"></div>
        <span class="caret"></span>
      </div>

      <!-- PLAYER -->
      <div class="music-player">
        <iframe
          id="sp-player"
          title="Música"
          src=""
          allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
          loading="lazy"
        ></iframe>
      </div>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
